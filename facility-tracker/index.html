<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>總務工作追蹤系統</title>
<style>
  :root{
    --surface-0:#f5f4f0; --surface-1:#fbfaf7; --surface-2:#ffffff;
    --text-primary:#1a1a18; --text-secondary:#5f5e5a; --text-muted:#8a8983;
    --border:#e2e0da; --border-strong:#c7c5bd;
    --accent:#185fa5; --bg-accent:#e6f1fb;
    --red:#a32d2d; --bg-red:#fcebeb;
    --amber:#854f0b; --bg-amber:#faeeda;
    --purple:#3c3489; --bg-purple:#eeedfe;
    --green:#27500a; --bg-green:#eaf3de;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--surface-0); color:var(--text-primary); margin:0; padding:24px 16px 80px;
  }
  .wrap{max-width:760px; margin:0 auto;}
  h1{font-size:20px; font-weight:600; margin:0 0 4px;}
  .sub{color:var(--text-secondary); font-size:13px; margin:0 0 16px;}

  .tabs{display:flex; gap:4px; margin-bottom:16px; border-bottom:0.5px solid var(--border);}
  .tab-btn{
    font-family:inherit; font-size:14px; padding:10px 16px; border:none; background:none;
    color:var(--text-secondary); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--accent); border-bottom-color:var(--accent); font-weight:600;}
  .tab-btn:hover{color:var(--text-primary);}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
  .filters{display:flex; gap:6px; flex-wrap:wrap;}
  .filter-row2{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .filter-row2 select, .filter-row2 input{font-size:13px; padding:7px 10px;}
  .search-box{flex:1; min-width:160px;}
  button{
    font-family:inherit; font-size:13px; padding:8px 14px; border-radius:var(--radius);
    border:0.5px solid var(--border-strong); background:var(--surface-2); color:var(--text-primary);
    cursor:pointer;
  }
  button:hover{background:var(--surface-1);}
  button.active{background:var(--surface-1); border-color:var(--accent); color:var(--accent);}
  button.primary{border-color:var(--accent); color:var(--accent); font-weight:500;}
  button:disabled{opacity:0.6; cursor:default;}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:20px;}
  .stat{background:var(--surface-2); border-radius:var(--radius); padding:14px; border:0.5px solid var(--border);}
  .stat.warn{border-color:var(--red); background:var(--bg-red);}
  .stat .label{font-size:12px; color:var(--text-secondary); margin:0 0 4px;}
  .stat.warn .label{color:var(--red);}
  .stat .value{font-size:22px; font-weight:600; margin:0;}
  .stat.warn .value{color:var(--red);}
  .card{background:var(--surface-2); border:0.5px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:20px;}
  .card h3{font-size:14px; font-weight:600; margin:0 0 4px;}
  .card .hint{font-size:12px; color:var(--text-muted); margin:0 0 12px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .field{display:flex; flex-direction:column; gap:4px;}
  .field.full{grid-column:1/-1;}
  label{font-size:12px; color:var(--text-secondary);}
  input,select,textarea{
    font-family:inherit; font-size:14px; padding:8px 10px; border-radius:var(--radius);
    border:0.5px solid var(--border-strong); background:var(--surface-2); color:var(--text-primary);
  }
  textarea{resize:vertical;}
  .period-toggle{display:flex; border:0.5px solid var(--border-strong); border-radius:var(--radius); overflow:hidden;}
  .period-toggle button{border:none; border-radius:0; flex:1;}
  .period-toggle button.on{background:var(--surface-1); font-weight:600;}
  .time-row{display:flex; gap:6px;}
  .actions{display:flex; gap:8px; margin-top:14px;}
  .group{margin-bottom:14px;}
  .group summary{
    cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; background:var(--surface-1); border:0.5px solid var(--border); border-radius:var(--radius);
    font-weight:600; font-size:14px;
  }
  .group summary::-webkit-details-marker{display:none;}
  .group summary .count{font-weight:400; color:var(--text-secondary); font-size:12px;}
  .group-body{padding-top:8px;}
  .list-row{background:var(--surface-2); border:0.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; cursor:pointer;}
  .list-row:hover{border-color:var(--border-strong);}
  .list-row.overdue{border-left:3px solid var(--red);}
  .row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .row-title{font-weight:600; font-size:14px; margin:0;}
  .row-desc{font-size:13px; color:var(--text-secondary); margin:2px 0 0;}
  .row-meta{font-size:12px; color:var(--text-muted); margin:6px 0 0;}
  .row-meta .overdue-tag{color:var(--red); font-weight:600;}
  .badge{font-size:12px; padding:3px 10px; border-radius:var(--radius); white-space:nowrap; font-weight:500;}
  .b-red{background:var(--bg-red); color:var(--red);}
  .b-amber{background:var(--bg-amber); color:var(--amber);}
  .b-purple{background:var(--bg-purple); color:var(--purple);}
  .b-green{background:var(--bg-green); color:var(--green);}
  .empty{color:var(--text-muted); font-size:14px; padding:20px 0; text-align:center;}
  .syncbar{font-size:13px; color:var(--text-secondary); margin-bottom:10px;}
  .view{display:none;}
  .view.active{display:block;}

  .section-label{
    display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.02em;
    margin:0 0 8px; padding-top:4px;
  }
  .section-label.pending{color:var(--accent);}
  .section-recorded{background:var(--surface-1); border-radius:var(--radius); padding:12px; margin-bottom:16px;}
  .section-recorded input, .section-recorded select{background:var(--surface-0);}
  .field-empty input, .field-empty select, .field-empty textarea{
    border-color:var(--accent); background:var(--bg-accent);
  }
  .field-empty label{color:var(--accent); font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <h1>總務工作追蹤系統</h1>
  <p class="sub">水電、空調、漏水等大樓維修案件登記與進度追蹤</p>

  <div id="syncBar" class="syncbar" style="display:none;"></div>

  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <button class="primary" id="newBtn">+ 快速建檔</button>
  </div>

  <div id="formWrap" style="display:none;"></div>

  <div id="loadingMsg" class="empty">正在讀取 Google Sheet 資料...</div>

  <!-- 待辦總覽 -->
  <div class="view" id="view-todo">
    <div class="stats" id="todoStats"></div>
    <div id="todoList"></div>
  </div>

  <!-- 依樓層檢視 -->
  <div class="view" id="view-floor">
    <div class="stats" id="floorStats"></div>
    <div id="floorList"></div>
  </div>

  <!-- 全部案件(搜尋) -->
  <div class="view" id="view-search">
    <div class="filters" id="statusFilters" style="margin-bottom:10px;"></div>
    <div class="filter-row2">
      <select id="categoryFilter"></select>
      <input class="search-box" id="searchBox" type="text" placeholder="搜尋地點、問題描述、通報人...">
    </div>
    <div id="searchList"></div>
  </div>
</div>

<datalist id="floorDatalist">
  <option value="B1"></option>
  <option value="1F"></option>
  <option value="2F"></option>
  <option value="3F"></option>
  <option value="4F"></option>
  <option value="5F"></option>
  <option value="6F"></option>
  <option value="7F"></option>
  <option value="8F"></option>
  <option value="9F"></option>
  <option value="10F"></option>
  <option value="11F"></option>
  <option value="12F"></option>
  <option value="頂樓"></option>
</datalist>

<script>
const SHEET_ID = '1da1UXW0tCFvgWI2Ocz6v3afV3Gf45cCMI8EmZBh2wlU';
const SHEET_NAME = '案件紀錄';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqSM31tNo0lop1TzhYKvH7qzQISnGpujL9yiBCN7vDdmJJ1gOo8lPnPv6H0z7WkNR5/exec';
const HEADERS = ['案件編號','通報日期','通報時間(小時)','通報方式','通報人','分機','問題類別','地點(樓層)','地點(細節)','問題描述','緊急程度','負責人/廠商','處理狀態','回覆同仁時間','完成時間','處理記錄/備註','原始申請單號'];

const CATS = ["電力照明","給排水・漏水","空調","機械停車車梯","辦公設備(事務機/電話)","門禁/監控設備","清潔","一般修繕","其他"];
const STATUS = ["待處理","處理中","待外包/待料","已完成"];
const STATUS_CLASS = {"待處理":"b-red","處理中":"b-amber","待外包/待料":"b-purple","已完成":"b-green"};
const PRIORITY = ["緊急","一般","低"];
const CHANNELS = ["電話","口頭","填單","Email"];
const FLOOR_OPTIONS = ["B1","1F","2F","3F","4F","5F","6F","7F","8F","9F","10F","11F","12F","頂樓"];
const FLOOR_GROUP_ORDER = ["B1","1F","2F","3F","4F","5F","6F","7F","8F","9F","10F","11F","12F","頂樓","未填樓層"];
const OVERDUE_DAYS = 3; // 待處理/處理中超過幾天視為逾期提醒

let cases = [];
let currentTab = 'todo';
let statusFilter = "全部";
let categoryFilter = "全部";
let searchText = "";

function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function nowHour(){ return new Date().getHours(); }
function daysSince(dateStr){
  if(!dateStr) return 0;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
}

function normalizeFloorLabel(floor){
  if(!floor || !String(floor).trim()) return '未填樓層';
  const f = String(floor).trim().toUpperCase();
  if(f === '頂樓' || f.includes('頂')) return '頂樓';
  if(/^B\d+$/.test(f)) return f;
  if(/^\d+F$/.test(f)) return f;
  if(/^\d+$/.test(f)) return f + 'F';
  return f;
}

function parseGvizValue(cell){
  if(!cell || cell.v === null || cell.v === undefined) return '';
  const v = cell.v;
  if(typeof v === 'string' && v.startsWith('Date(')){
    const m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m) return `${m[1]}-${pad(+m[2]+1)}-${pad(+m[3])}`;
  }
  return String(v);
}

function to12(h){ const period = h<12 ? '上午' : '下午'; let h12 = h%12; if(h12===0) h12=12; return {period, h12}; }
function from12(period, h12){ let h = h12 % 12; if(period==='下午') h += 12; if(h12===12 && period==='上午') h = 0; return h; }

function timePickerHtml(idPrefix, selectedHour){
  const {period, h12} = to12(selectedHour);
  let opts = '';
  for(let i=1;i<=12;i++){ opts += `<option value="${i}" ${i===h12?'selected':''}>${i} 點</option>`; }
  return `
    <div class="time-row" data-active-period="${period}" id="${idPrefix}_wrap">
      <div class="period-toggle">
        <button type="button" data-period="上午" class="period-btn-${idPrefix} ${period==='上午'?'on':''}">上午</button>
        <button type="button" data-period="下午" class="period-btn-${idPrefix} ${period==='下午'?'on':''}">下午</button>
      </div>
      <select id="${idPrefix}_h12" style="flex:1;">${opts}</select>
    </div>
  `;
}
function wirePeriodButtons(idPrefix){
  document.querySelectorAll('.period-btn-'+idPrefix).forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.period-btn-'+idPrefix).forEach(b=> b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(idPrefix+'_wrap').dataset.activePeriod = btn.dataset.period;
    };
  });
}
function getPickedHour(idPrefix){
  const period = document.getElementById(idPrefix+'_wrap').dataset.activePeriod;
  const h12 = parseInt(document.getElementById(idPrefix+'_h12').value);
  return from12(period, h12);
}

async function loadFromSheet(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}')+1);
  const data = JSON.parse(jsonStr);
  const rows = data.table.rows;
  cases = rows.map(r=>{
    const c = r.c;
    const obj = {};
    HEADERS.forEach((h, i)=>{ obj[h] = c[i] ? parseGvizValue(c[i]) : ''; });
    return obj;
  }).filter(o=>{
    if(!o['案件編號']) return false;
    if(o['案件編號'] === '案件編號') return false;
    return true;
  });
}

async function postToSheet(payload){
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

function renderTabs(){
  const wrap = document.getElementById('tabs');
  const tabs = [
    {id:'todo', label:'待辦總覽'},
    {id:'floor', label:'依樓層檢視'},
    {id:'search', label:'全部案件'}
  ];
  wrap.innerHTML = '';
  tabs.forEach(t=>{
    const b = document.createElement('button');
    b.className = 'tab-btn' + (currentTab===t.id ? ' active' : '');
    b.textContent = t.label;
    b.onclick = ()=>{ currentTab = t.id; render(); };
    wrap.appendChild(b);
  });
}

function makeRow(c, opts){
  opts = opts || {};
  const row = document.createElement('div');
  const status = c['處理狀態'] || '待處理';
  const cls = STATUS_CLASS[status] || 'b-red';
  const loc = [c['地點(樓層)'], c['地點(細節)']].filter(Boolean).join(' ');
  const isActive = (status==='待處理' || status==='處理中' || status==='待外包/待料');
  const age = daysSince(c['通報日期']);
  const overdue = isActive && age >= OVERDUE_DAYS;
  row.className = 'list-row' + (overdue ? ' overdue' : '');
  const ageText = isActive ? `・已等待 <span class="${overdue?'overdue-tag':''}">${age} 天${overdue?' ⚠':''}</span>` : '';
  row.innerHTML = `
    <div class="row-top">
      <div>
        <p class="row-title">${loc || '(未填地點)'} · ${c['問題類別']||''}</p>
        <p class="row-desc">${c['問題描述'] || ''}</p>
        <p class="row-meta">通報 ${c['通報日期']||'—'} ・ ${c['通報人']||'—'} ${c['負責人/廠商']?'・負責人 '+c['負責人/廠商']:''} ${ageText}</p>
      </div>
      <span class="badge ${cls}">${status}</span>
    </div>
  `;
  row.onclick = ()=> openFullForm(c);
  return row;
}

// ---------- 待辦總覽 ----------
function renderTodoView(){
  const active = cases.filter(c=>{
    const s = c['處理狀態'] || '待處理';
    return s==='待處理' || s==='處理中' || s==='待外包/待料';
  });
  const overdueCount = active.filter(c=> daysSince(c['通報日期']) >= OVERDUE_DAYS).length;
  const counts = {};
  STATUS.forEach(s=> counts[s] = cases.filter(c=>c['處理狀態']===s).length);

  const statsWrap = document.getElementById('todoStats');
  statsWrap.innerHTML = '';
  [
    {label:'待處理中案件', value: active.length},
    {label:'逾期(超過'+OVERDUE_DAYS+'天)', value: overdueCount, warn:true},
    {label:'待外包/待料', value: counts['待外包/待料']},
    {label:'今日已建立', value: cases.filter(c=>c['通報日期']===todayStr()).length}
  ].forEach(it=>{
    const d = document.createElement('div');
    d.className = 'stat' + (it.warn ? ' warn' : '');
    d.innerHTML = `<p class="label">${it.label}</p><p class="value">${it.value}</p>`;
    statsWrap.appendChild(d);
  });

  const sorted = active.slice().sort((a,b)=> new Date(a['通報日期']) - new Date(b['通報日期']));
  const listWrap = document.getElementById('todoList');
  listWrap.innerHTML = '';
  if(!sorted.length){
    listWrap.innerHTML = '<p class="empty">目前沒有待處理的案件,太好了。</p>';
    return;
  }
  sorted.forEach(c=> listWrap.appendChild(makeRow(c)));
}

// ---------- 依樓層檢視 ----------
function renderFloorView(){
  const statsWrap = document.getElementById('floorStats');
  const byFloor = {};
  cases.forEach(c=>{
    const g = normalizeFloorLabel(c['地點(樓層)']);
    byFloor[g] = (byFloor[g]||0) + 1;
  });
  const topFloor = Object.entries(byFloor).sort((a,b)=>b[1]-a[1])[0];
  statsWrap.innerHTML = '';
  [
    {label:'總案件數', value: cases.length},
    {label:'案件最多樓層', value: topFloor ? `${topFloor[0]} (${topFloor[1]}筆)` : '—'},
    {label:'涵蓋樓層數', value: Object.keys(byFloor).length}
  ].forEach(it=>{
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = `<p class="label">${it.label}</p><p class="value" style="font-size:18px;">${it.value}</p>`;
    statsWrap.appendChild(d);
  });

  const wrap = document.getElementById('floorList');
  wrap.innerHTML = '';
  const groups = {};
  cases.forEach(c=>{
    const g = normalizeFloorLabel(c['地點(樓層)']);
    if(!groups[g]) groups[g] = [];
    groups[g].push(c);
  });
  const orderedKeys = Object.keys(groups).sort((a,b)=>{
    let ia = FLOOR_GROUP_ORDER.indexOf(a); if(ia<0) ia = 999;
    let ib = FLOOR_GROUP_ORDER.indexOf(b); if(ib<0) ib = 999;
    if(ia!==ib) return ia-ib;
    return a.localeCompare(b);
  });
  orderedKeys.forEach(key=>{
    const items = groups[key].sort((a,b)=> new Date(b['通報日期']) - new Date(a['通報日期']));
    const details = document.createElement('details');
    details.className = 'group';
    const summary = document.createElement('summary');
    summary.innerHTML = `<span>${key}</span><span class="count">${items.length} 筆</span>`;
    details.appendChild(summary);
    const body = document.createElement('div');
    body.className = 'group-body';
    items.forEach(c=> body.appendChild(makeRow(c)));
    details.appendChild(body);
    wrap.appendChild(details);
  });
}

// ---------- 全部案件(搜尋) ----------
function renderSearchView(){
  const filterWrap = document.getElementById('statusFilters');
  filterWrap.innerHTML = '';
  ['全部', ...STATUS].forEach(s=>{
    const b = document.createElement('button');
    b.textContent = s;
    if(s===statusFilter) b.classList.add('active');
    b.onclick = ()=>{ statusFilter = s; render(); };
    filterWrap.appendChild(b);
  });

  const catSel = document.getElementById('categoryFilter');
  if(!catSel.dataset.wired){
    catSel.innerHTML = ['全部類別', ...CATS].map(c=>`<option value="${c==='全部類別'?'全部':c}">${c}</option>`).join('');
    catSel.onchange = ()=>{ categoryFilter = catSel.value; render(); };
    catSel.dataset.wired = '1';
  }
  const searchBox = document.getElementById('searchBox');
  if(!searchBox.dataset.wired){
    searchBox.oninput = ()=>{ searchText = searchBox.value.trim().toLowerCase(); render(); };
    searchBox.dataset.wired = '1';
  }

  let list = cases.slice();
  if(statusFilter !== '全部') list = list.filter(c=>c['處理狀態']===statusFilter);
  if(categoryFilter !== '全部') list = list.filter(c=>c['問題類別']===categoryFilter);
  if(searchText){
    list = list.filter(c=>{
      const hay = [c['地點(樓層)'],c['地點(細節)'],c['問題描述'],c['通報人'],c['問題類別']].join(' ').toLowerCase();
      return hay.includes(searchText);
    });
  }
  list.sort((a,b)=> new Date(b['通報日期']) - new Date(a['通報日期']));

  const wrap = document.getElementById('searchList');
  wrap.innerHTML = '';
  if(!list.length){
    wrap.innerHTML = '<p class="empty">目前沒有符合條件的案件。</p>';
    return;
  }
  list.forEach(c=> wrap.appendChild(makeRow(c)));
}

function openQuickForm(){
  const wrap = document.getElementById('formWrap');
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div class="card">
      <h3>快速建檔</h3>
      <p class="hint">關鍵資訊現在就寫,其他處理細節晚一點補。</p>
      <div class="grid2">
        <div class="field"><label>通報人</label><input id="q_reporter" placeholder="姓名/部門"></div>
        <div class="field"><label>分機</label><input id="q_ext" placeholder="例如 123"></div>
        <div class="field"><label>通報日期</label><input type="date" id="q_date" value="${todayStr()}"></div>
        <div class="field"><label>通報時間</label>${timePickerHtml('q', nowHour())}</div>
        <div class="field"><label>通報方式</label><select id="q_channel">${CHANNELS.map(x=>`<option>${x}</option>`).join('')}</select></div>
        <div class="field"><label>問題類別</label><select id="q_category">${CATS.map(x=>`<option>${x}</option>`).join('')}</select></div>
        <div class="field"><label>樓層</label><select id="q_floor">${FLOOR_OPTIONS.map(x=>`<option>${x}</option>`).join('')}</select></div>
        <div class="field"><label>地點細節</label><input id="q_location" placeholder="例如 男廁"></div>
        <div class="field full"><label>簡述</label><input id="q_desc" placeholder="例如 馬桶後方漏水"></div>
      </div>
      <div class="actions">
        <button class="primary" id="quickSaveBtn">建立案件</button>
        <button id="quickCancelBtn">取消</button>
      </div>
    </div>
  `;
  wirePeriodButtons('q');
  document.getElementById('quickCancelBtn').onclick = ()=>{ wrap.style.display='none'; wrap.innerHTML=''; };
  document.getElementById('quickSaveBtn').onclick = async ()=>{
    const btn = document.getElementById('quickSaveBtn');
    btn.disabled = true; btn.textContent = '建立中...';
    const hour = getPickedHour('q');
    const payload = {
      '通報日期': document.getElementById('q_date').value,
      '通報時間(小時)': pad(hour)+':00',
      '通報方式': document.getElementById('q_channel').value,
      '通報人': document.getElementById('q_reporter').value,
      '分機': document.getElementById('q_ext').value,
      '問題類別': document.getElementById('q_category').value,
      '地點(樓層)': document.getElementById('q_floor').value,
      '地點(細節)': document.getElementById('q_location').value,
      '問題描述': document.getElementById('q_desc').value,
      '緊急程度': '一般',
      '處理狀態': '待處理'
    };
    try{
      const result = await postToSheet(payload);
      payload['案件編號'] = result.caseId;
      cases.unshift(payload);
      wrap.style.display='none'; wrap.innerHTML='';
      render();
    }catch(e){
      alert('建立失敗,請檢查網路連線後再試一次');
      btn.disabled = false; btn.textContent = '建立案件';
    }
  };
}

function openFullForm(c){
  const wrap = document.getElementById('formWrap');
  wrap.style.display = 'block';
  const reportedHour = c['通報時間(小時)'] ? parseInt(c['通報時間(小時)']) : nowHour();

  // 處理進度欄位若為空,加上 field-empty 樣式提醒還沒填
  const emptyCls = (val)=> val ? '' : ' field-empty';

  wrap.innerHTML = `
    <div class="card">
      <h3>編輯案件 ${c['案件編號']}</h3>

      <p class="section-label">📋 通報資訊(建檔時已填寫)</p>
      <div class="grid2 section-recorded">
        <div class="field"><label>通報人</label><input id="f_reporter" value="${c['通報人']||''}"></div>
        <div class="field"><label>分機</label><input id="f_ext" value="${c['分機']||''}"></div>
        <div class="field"><label>通報日期</label><input type="date" id="f_date" value="${c['通報日期']||todayStr()}"></div>
        <div class="field"><label>通報時間</label>${timePickerHtml('f', reportedHour)}</div>
        <div class="field"><label>通報方式</label><select id="f_channel">${CHANNELS.map(x=>`<option ${x===c['通報方式']?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field"><label>問題類別</label><select id="f_category">${CATS.map(x=>`<option ${x===c['問題類別']?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field"><label>樓層</label><input id="f_floor" value="${c['地點(樓層)']||''}" list="floorDatalist" placeholder="例如 6F"></div>
        <div class="field"><label>地點(細節)</label><input id="f_location" value="${c['地點(細節)']||''}"></div>
        <div class="field full"><label>問題描述</label><textarea id="f_desc" rows="2">${c['問題描述']||''}</textarea></div>
      </div>

      <p class="section-label pending">🔧 處理進度(請補充)</p>
      <div class="grid2">
        <div class="field${emptyCls(c['負責人/廠商'])}"><label>負責人/廠商</label><input id="f_assignee" value="${c['負責人/廠商']||''}" placeholder="尚未填寫"></div>
        <div class="field"><label>處理狀態</label><select id="f_status">${STATUS.map(x=>`<option ${x===c['處理狀態']?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field"><label>緊急程度</label><select id="f_priority">${PRIORITY.map(x=>`<option ${x===c['緊急程度']?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field${emptyCls(c['完成時間'])}"><label>完成日期</label><input type="date" id="f_completed" value="${c['完成時間']||''}"></div>
        <div class="field full${emptyCls(c['處理記錄/備註'])}"><label>處理記錄/備註</label><textarea id="f_notes" rows="2" placeholder="尚未填寫">${c['處理記錄/備註']||''}</textarea></div>
      </div>

      <div class="actions">
        <button class="primary" id="saveBtn">儲存</button>
        <button id="cancelBtn">取消</button>
      </div>
    </div>
  `;
  wirePeriodButtons('f');
  document.getElementById('cancelBtn').onclick = ()=>{ wrap.style.display='none'; wrap.innerHTML=''; };
  document.getElementById('saveBtn').onclick = async ()=>{
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '儲存中...';
    const hour = getPickedHour('f');
    const payload = {
      '案件編號': c['案件編號'],
      '通報日期': document.getElementById('f_date').value,
      '通報時間(小時)': pad(hour)+':00',
      '通報方式': document.getElementById('f_channel').value,
      '通報人': document.getElementById('f_reporter').value,
      '分機': document.getElementById('f_ext').value,
      '問題類別': document.getElementById('f_category').value,
      '地點(樓層)': document.getElementById('f_floor').value,
      '地點(細節)': document.getElementById('f_location').value,
      '問題描述': document.getElementById('f_desc').value,
      '緊急程度': document.getElementById('f_priority').value,
      '負責人/廠商': document.getElementById('f_assignee').value,
      '處理狀態': document.getElementById('f_status').value,
      '完成時間': document.getElementById('f_completed').value,
      '處理記錄/備註': document.getElementById('f_notes').value,
      '原始申請單號': c['原始申請單號']||''
    };
    try{
      await postToSheet(payload);
      const idx = cases.findIndex(x=>x['案件編號']===c['案件編號']);
      if(idx>=0) cases[idx] = payload;
      wrap.style.display='none'; wrap.innerHTML='';
      render();
    }catch(e){
      alert('儲存失敗,請檢查網路連線後再試一次');
      btn.disabled = false; btn.textContent = '儲存';
    }
  };
}

function render(){
  renderTabs();
  document.querySelectorAll('.view').forEach(v=> v.classList.remove('active'));
  document.getElementById('view-'+currentTab).classList.add('active');
  if(currentTab==='todo') renderTodoView();
  if(currentTab==='floor') renderFloorView();
  if(currentTab==='search') renderSearchView();
}

document.getElementById('newBtn').onclick = openQuickForm;

(async function init(){
  try{
    await loadFromSheet();
    document.getElementById('loadingMsg').style.display = 'none';
    render();
  }catch(e){
    document.getElementById('loadingMsg').textContent = '讀取失敗,請確認 Google Sheet 已開放「知道連結的任何人」檢視權限,或檢查網路連線。';
  }
})();
</script>
</body>
</html>
