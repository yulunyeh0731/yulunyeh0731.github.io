<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEX-RAY 展覽管理系統</title>
<style>
  :root {
    /* 語意色系：藍=確定進行中、橘黃=待決定、綠=已完成、灰=不適用/已過 */
    --blue: #1D4ED8;     --blue-bg: #EFF4FF;     --blue-soft: #DBE6FE;
    --amber: #B45309;    --amber-bg: #FFF7E8;    --amber-soft: #FCE7C3;
    --green: #15803D;    --green-bg: #F0FBF4;    --green-soft: #CDEFDA;
    --gray: #6B7280;     --gray-bg: #F5F5F5;     --gray-soft: #E5E5E5;

    --border: #EAEAEA;
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #18181B;
    --text-secondary: #71717A;
    --text-tertiary: #A1A1AA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 1rem; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header span { font-size: 12px; color: var(--text-tertiary); }

  .year-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .year-tab {
    font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card); color: var(--text-tertiary); cursor: pointer;
  }
  .year-tab.active { background: var(--text); color: #fff; border-color: var(--text); }
  .year-tab[disabled] { opacity: 0.45; cursor: default; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-box { border-radius: 12px; padding: 0.85rem 0.9rem; border: 1px solid transparent; }
  .stat-box p:first-child { font-size: 12px; margin: 0 0 6px; opacity: 0.85; }
  .stat-box p:last-child { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .stat-total   { background: var(--gray-bg); color: var(--text); }
  .stat-total p:first-child { color: var(--text-secondary); }
  .stat-confirmed { background: var(--blue-bg); color: var(--blue); }
  .stat-evaluating { background: var(--amber-bg); color: var(--amber); }
  .stat-done { background: var(--green-bg); color: var(--green); }

  .group-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .group-label:first-child { margin-top: 0; }
  .ex-row {
    display: flex; align-items: center; gap: 12px; padding: 11px 8px;
    border-bottom: 1px solid var(--border); cursor: pointer; border-left: 3px solid transparent;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-row:hover { background: var(--bg); }
  .ex-row.c-blue { border-left-color: var(--blue); }
  .ex-row.c-amber { border-left-color: var(--amber); }
  .ex-row.c-green { border-left-color: var(--green); }
  .ex-row.c-gray { border-left-color: var(--gray-soft); }
  .ex-name { font-size: 13.5px; font-weight: 600; flex: 1.6; min-width: 0; }
  .ex-date { font-size: 12.5px; color: var(--text-secondary); flex: 1; }
  .ex-place { font-size: 12.5px; color: var(--text-secondary); flex: 0.9; }
  .ex-row .tag { flex: 0 0 auto; }
  @media (max-width: 600px) {
    .ex-row { flex-wrap: wrap; }
    .ex-name { flex: 1 1 100%; }
    .ex-date, .ex-place { font-size: 12px; }
  }

  .collapse-toggle { font-size: 12.5px; color: var(--text-tertiary); cursor: pointer; padding: 8px 8px 2px; user-select: none; }
  .collapse-toggle:hover { color: var(--text-secondary); }
  .collapsed { display: none; }

  .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; display: inline-block; white-space: nowrap; }
  .tag-blue { background: var(--blue-soft); color: var(--blue); }
  .tag-green { background: var(--green-soft); color: var(--green); }
  .tag-amber { background: var(--amber-soft); color: var(--amber); }
  .tag-gray { background: var(--gray-soft); color: var(--gray); }

  .hidden { display: none; }
  .back-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text-secondary); }
  .back-btn:hover { background: var(--bg); }
  .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
  @media (max-width: 600px) { .detail-row { grid-template-columns: 1fr; } }
  .detail-row div span:first-child { color: var(--text-tertiary); margin-right: 6px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .table-scroll { overflow-x: auto; }
  .loading { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 13px; }

  /* 詳情頁重點資訊卡 */
  .hero-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 0; }
  @media (max-width: 600px) { .hero-grid { grid-template-columns: 1fr 1fr; } }
  .hero-box { background: var(--bg); border-radius: 12px; padding: 0.9rem 1rem; }
  .hero-box p:first-child { font-size: 11.5px; color: var(--text-tertiary); margin: 0 0 5px; font-weight: 600; }
  .hero-box p:last-child { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }

  .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
  .photo-box { background: var(--bg); border-radius: 10px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); text-decoration: none; font-size: 22px; }
  .photo-box:hover { background: var(--gray-soft); }

  .file-card { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border-radius: 10px; margin-bottom: 6px; text-decoration: none; color: var(--text); font-size: 13px; }
  .file-card:hover { background: var(--gray-soft); }
  .file-card .arrow { margin-left: auto; color: var(--text-tertiary); }
  .empty-note { font-size: 12.5px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>🏢 集團展覽管理中心</h1>
    <span id="updated-label"></span>
  </header>

  <div class="year-tabs" id="year-tabs"></div>

  <div id="loading" class="loading">資料載入中...</div>

  <!-- 主畫面：總覽 + 一覽表 -->
  <div id="view-main" class="hidden">
    <div class="card">
      <p class="section-title" id="stats-year-label">2026 年度展覽進度</p>
      <div class="stats-grid">
        <div class="stat-box stat-total"><p>全年展覽數</p><p id="stat-total">-</p></div>
        <div class="stat-box stat-confirmed"><p>確定參加</p><p id="stat-confirmed">-</p></div>
        <div class="stat-box stat-evaluating"><p>評估中</p><p id="stat-evaluating">-</p></div>
        <div class="stat-box stat-done"><p>已結案</p><p id="stat-done">-</p></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">展覽一覽　·　點任一筆查看詳情</p>
      <div id="group-confirmed"></div>
      <div id="group-evaluating"></div>
      <div id="group-done"></div>
      <div id="group-skipped"></div>
    </div>
  </div>

  <!-- 詳情畫面 -->
  <div id="view-detail" class="hidden">
    <button class="back-btn" onclick="showMain()">← 返回總覽</button>
    <div class="card" style="margin-top:10px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
        <span id="d-name" style="font-size:18px; font-weight:700;"></span>
        <span id="d-status" class="tag" style="margin-left:auto;"></span>
      </div>
      <div class="hero-grid">
        <div class="hero-box"><p>展期</p><p id="d-date"></p></div>
        <div class="hero-box"><p>地點</p><p id="d-place"></p></div>
        <div class="hero-box"><p>攤位</p><p id="d-booth"></p></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">其他資訊</p>
      <div class="detail-row">
        <div><span>攤位大小</span><span id="d-boothsize"></span></div>
        <div><span>參展性質</span><span id="d-nature"></span></div>
        <div><span>執行單位</span><span id="d-unit"></span></div>
        <div><span>業務參展人</span><span id="d-salesperson"></span></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">預算與補助</p>
      <div class="detail-row">
        <div><span>預算費用</span><span id="d-budget"></span></div>
        <div><span>補助申請金額</span><span id="d-subsidy-apply"></span></div>
        <div><span>補助核准金額</span><span id="d-subsidy-approved"></span></div>
        <div><span>補助核銷狀態</span><span id="d-subsidy-status"></span></div>
        <div><span>需要結案簡報</span><span id="d-report-needed"></span></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">現場照片</p>
      <div id="d-photos"></div>
    </div>

    <div class="card">
      <p class="section-title">宣傳素材</p>
      <div id="d-promo"></div>
    </div>

    <div class="card">
      <p class="section-title">結案報告</p>
      <div id="d-report"></div>
    </div>

    <div class="card">
      <p class="section-title">備註說明</p>
      <p id="d-note" style="font-size:13px; margin:0; color:var(--text-secondary);"></p>
    </div>
  </div>

</div>

<script>
// ====== 設定區：之後要換資料來源時，只要改這個網址 ======
const SHEET_ID = "1TOmdc6rHdLA5IqUziGm7rUTW10sUkRbmQtH_BM6rEyw";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let exhibitions = [];

function parseCSV(text) {
  // 簡易 CSV 解析（處理欄位中可能包含逗號的情況，使用引號）
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

const STATUS_COLOR = {
  '確定參加': 'blue', '評估中': 'amber', '已結案': 'gray', '暫不參加': 'gray'
};

let currentYear = null;

function statusTag(status) {
  const color = STATUS_COLOR[status] || 'gray';
  return `<span class="tag tag-${color}">${status || '-'}</span>`;
}

function fmtMoney(v) {
  if (!v) return '-';
  const n = Number(v);
  if (isNaN(n)) return v;
  return 'NT$ ' + n.toLocaleString();
}

function loadData() {
  fetch(CSV_URL)
    .then(res => res.text())
    .then(text => {
      const rows = parseCSV(text);
      const headers = rows[0].map(h => h.trim());
      exhibitions = rows.slice(1).filter(r => r.length > 1 && r[1]).map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = (r[i] || '').trim());
        return obj;
      });
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('updated-label').textContent = '更新時間：' + new Date().toLocaleString('zh-TW');
      renderYearTabs();
      showMain();
    })
    .catch(err => {
      document.getElementById('loading').textContent = '資料載入失敗，請確認 Google Sheet 分享權限是否設定為「知道連結的任何人皆可檢視」。';
      console.error(err);
    });
}

function renderYearTabs() {
  const years = [...new Set(exhibitions.map(e => e['年度']).filter(Boolean))].sort();
  currentYear = years[years.length - 1] || null;
  const wrap = document.getElementById('year-tabs');
  // 未來可擴增年度先預留 placeholder（無資料時顯示為灰階不可點擊）
  const allYears = [...new Set([...years, String(Number(currentYear) + 1)])];
  wrap.innerHTML = allYears.map(y => {
    const hasData = years.includes(y);
    return `<button class="year-tab ${y === currentYear ? 'active' : ''}" ${hasData ? `onclick="selectYear('${y}')"` : 'disabled'}>${y}${hasData ? '' : '（尚無資料）'}</button>`;
  }).join('');
  renderYearView();
}

function selectYear(y) {
  currentYear = y;
  document.querySelectorAll('.year-tab').forEach(b => b.classList.toggle('active', b.textContent.startsWith(y)));
  renderYearView();
}

function renderYearView() {
  const list = exhibitions.filter(e => e['年度'] === currentYear);
  document.getElementById('stats-year-label').textContent = `${currentYear} 年度展覽進度`;
  renderStats(list);
  renderGroupedList(list);
}

function renderStats(list) {
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-confirmed').textContent = list.filter(e => e['參展狀態'] === '確定參加').length;
  document.getElementById('stat-evaluating').textContent = list.filter(e => e['參展狀態'] === '評估中').length;
  document.getElementById('stat-done').textContent = list.filter(e => e['參展狀態'] === '已結案').length;
}

function exRowHtml(ex) {
  const idx = exhibitions.indexOf(ex);
  const color = STATUS_COLOR[ex['參展狀態']] || 'gray';
  return `
    <div class="ex-row c-${color}" onclick="showDetail(${idx})">
      <span class="ex-name">${ex['展覽名稱'] || ''}</span>
      <span class="ex-date">${shortDate(ex['展期開始'])} - ${shortDate(ex['展期結束'])}</span>
      <span class="ex-place">${ex['地點城市'] || ''}</span>
      ${statusTag(ex['參展狀態'])}
    </div>`;
}

function renderGroupedList(list) {
  const confirmed = list.filter(e => e['參展狀態'] === '確定參加');
  const evaluating = list.filter(e => e['參展狀態'] === '評估中');
  const done = list.filter(e => e['參展狀態'] === '已結案');
  const skipped = list.filter(e => e['參展狀態'] === '暫不參加');

  document.getElementById('group-confirmed').innerHTML = confirmed.length
    ? `<p class="group-label">確定參加</p>${confirmed.map(exRowHtml).join('')}` : '';
  document.getElementById('group-evaluating').innerHTML = evaluating.length
    ? `<p class="group-label">評估中</p>${evaluating.map(exRowHtml).join('')}` : '';
  document.getElementById('group-done').innerHTML = done.length
    ? `<p class="group-label">已結案</p>${done.map(exRowHtml).join('')}` : '';
  document.getElementById('group-skipped').innerHTML = skipped.length
    ? `<p class="collapse-toggle" onclick="toggleSkipped()">▸ 暫不參加（${skipped.length}）— 點擊展開</p>
       <div id="skipped-list" class="collapsed">${skipped.map(exRowHtml).join('')}</div>` : '';
}

function toggleSkipped() {
  const el = document.getElementById('skipped-list');
  el.classList.toggle('collapsed');
}

function shortDate(d) {
  if (!d) return '-';
  const parts = d.split('/');
  return parts.length === 3 ? `${parts[1]}/${parts[2]}` : d;
}

function fileCard(label, url, icon) {
  if (!url) return '';
  return `<a class="file-card" href="${url}" target="_blank" rel="noopener">
    <span>${icon}</span><span>${label}</span><span class="arrow">↓</span>
  </a>`;
}

function showDetail(idx) {
  const ex = exhibitions[idx];
  document.getElementById('d-name').textContent = ex['展覽名稱'] || '';
  document.getElementById('d-status').outerHTML = `<span id="d-status" class="tag tag-${STATUS_COLOR[ex['參展狀態']] || 'gray'}" style="margin-left:auto;">${ex['參展狀態'] || '-'}</span>`;
  document.getElementById('d-date').textContent = `${shortDate(ex['展期開始'])} - ${shortDate(ex['展期結束'])}`;
  document.getElementById('d-place').textContent = `${ex['地點城市'] || ''}`;
  document.getElementById('d-booth').textContent = ex['BoothNo'] || '未提供';
  document.getElementById('d-boothsize').textContent = ex['BoothSize'] || '-';
  document.getElementById('d-nature').textContent = ex['參展性質'] || '-';
  document.getElementById('d-unit').textContent = ex['執行單位'] || '-';
  document.getElementById('d-salesperson').textContent = ex['業務參展人'] || '-';
  document.getElementById('d-budget').textContent = fmtMoney(ex['預算費用']);
  document.getElementById('d-subsidy-apply').textContent = fmtMoney(ex['補助申請金額']);
  document.getElementById('d-subsidy-approved').textContent = fmtMoney(ex['補助核准金額']);
  document.getElementById('d-subsidy-status').textContent = ex['補助核銷狀態'] || '-';
  document.getElementById('d-report-needed').textContent = ex['是否需要結案簡報'] || '-';
  document.getElementById('d-note').textContent = ex['備註說明'] || '（無）';

  // 照片：改為單一資料夾連結（欄位：照片資料夾連結）
  document.getElementById('d-photos').innerHTML = ex['照片資料夾連結']
    ? fileCard('查看現場照片資料夾', ex['照片資料夾連結'], '📁')
    : `<p class="empty-note">尚無照片，可至文件庫上傳後在 Google Sheet 補上資料夾連結。</p>`;

  // 宣傳素材：Banner連結、邀請函連結
  const promoHtml = fileCard('Email Banner', ex['Banner連結'], '🖼️') + fileCard('邀請函', ex['邀請函連結'], '✉️');
  document.getElementById('d-promo').innerHTML = promoHtml || `<p class="empty-note">尚無宣傳素材。</p>`;

  // 結案報告
  const reportHtml = fileCard(`${ex['展覽名稱'] || ''} 結案簡報`, ex['結案報告連結'], '📊');
  document.getElementById('d-report').innerHTML = reportHtml || `<p class="empty-note">尚無結案報告，展覽結束後可補上連結。</p>`;

  document.getElementById('view-main').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showMain() {
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-main').classList.remove('hidden');
}

loadData();
</script>
</body>
</html>
